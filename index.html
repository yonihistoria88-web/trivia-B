<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia Bíblica Interactiva</title>
  <style>
    :root {
      --bg-color: #f4f6f9;
      --primary: #3b82f6;
      --success: #22c55e;
      --danger: #ef4444;
      --text: #1f2937;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text);
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 24px;
      box-sizing: border-box;
      position: relative;
    }

    .screen-start {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .btn-main {
      background: var(--primary);
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    .screen-game { display: none; }

    .timer-bar {
      width: 100%;
      height: 12px;
      background: #e5e7eb;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .timer-progress {
      height: 100%;
      width: 100%;
      background: var(--primary);
      transition: width 1s linear, background-color 0.3s;
    }

    .header-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .category-badge {
      background: #e0e7ff;
      color: #3730a3;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    .question-card {
      font-size: 1.15rem;
      margin-bottom: 24px;
      line-height: 1.4;
      font-weight: 600;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-option {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      padding: 16px;
      border-radius: 14px;
      font-size: 1rem;
      text-align: left;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-option.correct {
      background: #dcfce7;
      border-color: var(--success);
      color: #15803d;
    }

    .btn-option.wrong {
      background: #fee2e2;
      border-color: var(--danger);
      color: #b91c1c;
    }
  </style>
</head>
<body>

<div class="app-container">
  <div id="startScreen" class="screen-start">
    <h1>🎡 Trivia Bíblica</h1>
    <p>¿Preparados para poner a prueba sus conocimientos?</p>
    <button class="btn-main" onclick="initGame()">¡COMENZAR JUEGO!</button>
  </div>

  <div id="gameScreen" class="screen-game">
    <div class="timer-bar">
      <div id="timerProgress" class="timer-progress"></div>
    </div>

    <div class="header-info">
      <span id="categoryBadge" class="category-badge">Cargando...</span>
      <span id="timerText">⏱️ 30s</span>
    </div>

    <div class="question-card" id="questionText">Cargando pregunta...</div>

    <div class="options-grid" id="optionsContainer"></div>
  </div>
</div>

<script>
  // Motor de sonido nativo
  let audioCtx = null;
  let tickInterval = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function playTone(freq, duration, type = 'sine') {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function playCorrectSound() {
    initAudio();
    playTone(523.25, 0.15); // Do
    setTimeout(() => playTone(659.25, 0.15), 100); // Mi
    setTimeout(() => playTone(783.99, 0.3), 200);  // Sol
  }

  function playWrongSound() {
    initAudio();
    playTone(300, 0.2, 'sawtooth');
    setTimeout(() => playTone(220, 0.3, 'sawtooth'), 150);
  }

  function playTickSound() {
    initAudio();
    playTone(800, 0.05, 'square');
  }

  let questions = [];
  let currentQuestion = null;
  let timeLeft = 30;
  let maxTime = 30;
  let timerInterval;

  async function loadQuestions() {
    try {
      const res = await fetch('preguntas.json');
      questions = await res.json();
    } catch(e) {
      alert("Error al cargar las preguntas. Revisa el archivo preguntas.json");
    }
  }

  async function initGame() {
    initAudio();
    await loadQuestions();
    if (questions.length === 0) return;

    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';

    nextQuestion();
  }

  function nextQuestion() {
    const randomIndex = Math.floor(Math.random() * questions.length);
    currentQuestion = questions[randomIndex];

    document.getElementById('categoryBadge').innerText = currentQuestion.categoria;
    document.getElementById('questionText').innerText = currentQuestion.pregunta;

    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';

    currentQuestion.opciones.forEach((opcion, index) => {
      const btn = document.createElement('button');
      btn.className = 'btn-option';
      btn.innerText = opcion;
      btn.onclick = () => checkAnswer(index, btn);
      container.appendChild(btn);
    });

    startQuestionTimer(30);
  }

  function startQuestionTimer(seconds) {
    maxTime = seconds;
    timeLeft = seconds;
    clearInterval(timerInterval);
    clearInterval(tickInterval);

    updateTimerUI();

    // Sonido de tic-tac cada segundo
    tickInterval = setInterval(() => {
      if (timeLeft <= 10) playTickSound();
    }, 1000);

    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerUI();

      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        clearInterval(tickInterval);
        onTimeOut();
      }
    }, 1000);
  }

  function updateTimerUI() {
    const progressPercent = (timeLeft / maxTime) * 100;
    const progressBar = document.getElementById('timerProgress');
    progressBar.style.width = progressPercent + '%';

    if (progressPercent <= 30) {
      progressBar.style.backgroundColor = 'var(--danger)';
    } else {
      progressBar.style.backgroundColor = 'var(--primary)';
    }

    document.getElementById('timerText').innerText = `⏱️ ${timeLeft}s`;
  }

  function checkAnswer(selectedIndex, element) {
    clearInterval(timerInterval);
    clearInterval(tickInterval);

    const isCorrect = selectedIndex === currentQuestion.correcta;

    if (isCorrect) {
      element.classList.add('correct');
      playCorrectSound();
      setTimeout(() => {
        nextQuestion();
      }, 1000);
    } else {
      element.classList.add('wrong');
      playWrongSound();
      setTimeout(() => {
        nextQuestion();
      }, 1000);
    }
  }

  function onTimeOut() {
    playWrongSound();
    setTimeout(() => {
      nextQuestion();
    }, 1000);
  }
</script>

</body>
</html>
