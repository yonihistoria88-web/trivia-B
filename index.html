<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia Bíblica Interactiva</title>
  <style>
    :root {
      --bg-color: #f4f6f9;
      --primary: #3b82f6;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --text: #1f2937;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text);
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 24px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }

    /* PANTALLA DE INICIO */
    .screen-start {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .btn-main {
      background: var(--primary);
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      transition: transform 0.1s, background-color 0.2s;
    }

    .btn-main:active {
      transform: scale(0.97);
    }

    /* PANTALLA DE JUEGO */
    .screen-game {
      display: none;
    }

    /* BARRA SUPERIOR DE CRONÓMETRO */
    .timer-bar {
      width: 100%;
      height: 12px;
      background: #e5e7eb;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .timer-progress {
      height: 100%;
      width: 100%;
      background: var(--primary);
      transition: width 1s linear, background-color 0.3s;
    }

    .header-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .category-badge {
      background: #e0e7ff;
      color: #3730a3;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    .question-card {
      font-size: 1.15rem;
      margin-bottom: 24px;
      line-height: 1.4;
      font-weight: 600;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-option {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      padding: 16px;
      border-radius: 14px;
      font-size: 1rem;
      text-align: left;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-option:active {
      transform: scale(0.98);
    }

    .btn-option.correct {
      background: #dcfce7;
      border-color: var(--success);
      color: #15803d;
    }

    .btn-option.wrong {
      background: #fee2e2;
      border-color: var(--danger);
      color: #b91c1c;
    }
  </style>
</head>
<body>

<div class="app-container">

  <!-- AUDIOS DEL JUEGO -->
  <!-- Música / Tensión de fondo (Tic-Tac) -->
  <audio id="soundTension" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" loop></audio>
  <!-- Sonido de acierto / victoria -->
  <audio id="soundCorrect" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
  <!-- Sonido de error / tiempo agotado -->
  <audio id="soundWrong" src="https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3"></audio>

  <!-- 1. PANTALLA INICIAL DE BIENVENIDA -->
  <div id="startScreen" class="screen-start">
    <h1>🎡 Preguntados Bíblico</h1>
    <p>Responde rápido para obtener la máxima puntuación antes de que se agote el tiempo.</p>
    <button class="btn-main" onclick="initGame()">¡COMENZAR JUEGO!</button>
  </div>

  <!-- 2. PANTALLA PRINCIPAL DE PREGUNTAS -->
  <div id="gameScreen" class="screen-game">
    <!-- Barra de progreso del tiempo -->
    <div class="timer-bar">
      <div id="timerProgress" class="timer-progress"></div>
    </div>

    <div class="header-info">
      <span id="categoryBadge" class="category-badge">🔵 Personaje Bíblico</span>
      <span id="timerText">⏱️ 30s</span>
    </div>

    <div class="question-card" id="questionText">
      ¿Qué rey de Judá enfermó gravemente y recibió 15 años más de vida tras orar con fervor?
    </div>

    <div class="options-grid" id="optionsContainer">
      <button class="btn-option" onclick="checkAnswer(false, this)">A) Josías</button>
      <button class="btn-option" onclick="checkAnswer(true, this)">B) Ezequías</button>
      <button class="btn-option" onclick="checkAnswer(false, this)">C) Asa</button>
      <button class="btn-option" onclick="checkAnswer(false, this)">D) Manasés</button>
    </div>
  </div>

</div>

<script>
  // ELEMENTOS DE AUDIO
  const soundTension = document.getElementById('soundTension');
  const soundCorrect = document.getElementById('soundCorrect');
  const soundWrong = document.getElementById('soundWrong');

  // CONFIGURACIÓN DE VOLUMEN (0.0 a 1.0)
  soundTension.volume = 0.35; // Música/Tensión de fondo suave
  soundCorrect.volume = 0.8;
  soundWrong.volume = 0.8;

  // LÓGICA DEL CRONÓMETRO
  let timeLeft = 30;
  let maxTime = 30;
  let timerInterval;

  function initGame() {
    // Ocultar pantalla de inicio y mostrar juego
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';

    // Iniciar primera pregunta y temporizador
    startQuestionTimer(30);
  }

  function startQuestionTimer(seconds) {
    maxTime = seconds;
    timeLeft = seconds;
    clearInterval(timerInterval);

    // Iniciar sonido de tensión en bucle
    soundTension.currentTime = 0;
    soundTension.play().catch(e => console.log("Audio interactivo activado"));

    updateTimerUI();

    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerUI();

      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        onTimeOut();
      }
    }, 1000);
  }

  function updateTimerUI() {
    const progressPercent = (timeLeft / maxTime) * 100;
    const progressBar = document.getElementById('timerProgress');
    progressBar.style.width = progressPercent + '%';

    // Cambiar color de la barra cuando queda poco tiempo (ansiedad)
    if (progressPercent <= 30) {
      progressBar.style.backgroundColor = 'var(--danger)';
    } else {
      progressBar.style.backgroundColor = 'var(--primary)';
    }

    document.getElementById('timerText').innerText = `⏱️ ${timeLeft}s`;
  }

  // VALIDAR RESPUESTA DEL JUGADOR
  function checkAnswer(isCorrect, element) {
    // Detener temporizador y sonido de tensión
    clearInterval(timerInterval);
    soundTension.pause();

    if (isCorrect) {
      element.classList.add('correct');
      soundCorrect.play(); // Sonido de victoria/acierto
      
      setTimeout(() => {
        alert(`¡Correcto! Respondiste en ${maxTime - timeLeft} segundos.`);
        resetQuestionUI();
      }, 500);
    } else {
      element.classList.add('wrong');
      soundWrong.play(); // Sonido de error
      
      setTimeout(() => {
        alert("¡Incorrecto! Pierdes el turno.");
        resetQuestionUI();
      }, 500);
    }
  }

  function onTimeOut() {
    soundTension.pause();
    soundWrong.play(); // Sonido de tiempo agotado
    alert("¡Tiempo agotado! Pierdes el turno.");
    resetQuestionUI();
  }

  function resetQuestionUI() {
    // Restaurar estilos de botones
    const buttons = document.querySelectorAll('.btn-option');
    buttons.forEach(btn => btn.className = 'btn-option');
    
    // Reiniciar tiempo para la siguiente prueba
    startQuestionTimer(30);
  }
</script>

</body>
</html>
