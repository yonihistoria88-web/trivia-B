<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia Bíblica Interactiva</title>
  <style>
    :root {
      --bg-color: #f4f6f9;
      --primary: #3b82f6;
      --success: #22c55e;
      --danger: #ef4444;
      --text: #1f2937;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text);
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 24px;
      box-sizing: border-box;
      position: relative;
    }

    .screen-start {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .btn-main {
      background: var(--primary);
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    .screen-game { display: none; }

    .timer-bar {
      width: 100%;
      height: 12px;
      background: #e5e7eb;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .timer-progress {
      height: 100%;
      width: 100%;
      background: var(--primary);
      transition: width 1s linear, background-color 0.3s;
    }

    .header-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .category-badge {
      background: #e0e7ff;
      color: #3730a3;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    .question-card {
      font-size: 1.15rem;
      margin-bottom: 24px;
      line-height: 1.4;
      font-weight: 600;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-option {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      padding: 16px;
      border-radius: 14px;
      font-size: 1rem;
      text-align: left;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-option.correct {
      background: #dcfce7;
      border-color: var(--success);
      color: #15803d;
    }

    .btn-option.wrong {
      background: #fee2e2;
      border-color: var(--danger);
      color: #b91c1c;
    }
  </style>
</head>
<body>

<div class="app-container">
  <audio id="soundTension" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" loop></audio>
  <audio id="soundCorrect" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
  <audio id="soundWrong" src="https://assets.mixkit.co/active_storage/sfx/2572/2572-preview.mp3"></audio>

  <div id="startScreen" class="screen-start">
    <h1>🎡 Trivia Bíblica</h1>
    <p>¿Preparados para poner a prueba sus conocimientos?</p>
    <button class="btn-main" onclick="initGame()">¡COMENZAR JUEGO!</button>
  </div>

  <div id="gameScreen" class="screen-game">
    <div class="timer-bar">
      <div id="timerProgress" class="timer-progress"></div>
    </div>

    <div class="header-info">
      <span id="categoryBadge" class="category-badge">Cargando...</span>
      <span id="timerText">⏱️ 30s</span>
    </div>

    <div class="question-card" id="questionText">Cargando pregunta...</div>

    <div class="options-grid" id="optionsContainer"></div>
  </div>
</div>

<script>
  const soundTension = document.getElementById('soundTension');
  const soundCorrect = document.getElementById('soundCorrect');
  const soundWrong = document.getElementById('soundWrong');

  soundTension.volume = 0.35;
  soundCorrect.volume = 0.8;
  soundWrong.volume = 0.8;

  let questions = [];
  let currentQuestion = null;
  let timeLeft = 30;
  let maxTime = 30;
  let timerInterval;

  async function loadQuestions() {
    try {
      const res = await fetch('preguntas.json');
      questions = await res.json();
    } catch(e) {
      alert("Error al cargar las preguntas. Asegúrate de haber creado el archivo preguntas.json");
    }
  }

  async function initGame() {
    await loadQuestions();
    if (questions.length === 0) return;

    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';

    nextQuestion();
  }

  function nextQuestion() {
    // Seleccionar pregunta aleatoria
    const randomIndex = Math.floor(Math.random() * questions.length);
    currentQuestion = questions[randomIndex];

    document.getElementById('categoryBadge').innerText = currentQuestion.categoria;
    document.getElementById('questionText').innerText = currentQuestion.pregunta;

    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';

    currentQuestion.opciones.forEach((opcion, index) => {
      const btn = document.createElement('button');
      btn.className = 'btn-option';
      btn.innerText = opcion;
      btn.onclick = () => checkAnswer(index, btn);
      container.appendChild(btn);
    });

    startQuestionTimer(30);
  }

  function startQuestionTimer(seconds) {
    maxTime = seconds;
    timeLeft = seconds;
    clearInterval(timerInterval);

    soundTension.currentTime = 0;
    soundTension.play().catch(e => {});

    updateTimerUI();

    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerUI();

      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        onTimeOut();
      }
    }, 1000);
  }

  function updateTimerUI() {
    const progressPercent = (timeLeft / maxTime) * 100;
    const progressBar = document.getElementById('timerProgress');
    progressBar.style.width = progressPercent + '%';

    if (progressPercent <= 30) {
      progressBar.style.backgroundColor = 'var(--danger)';
    } else {
      progressBar.style.backgroundColor = 'var(--primary)';
    }

    document.getElementById('timerText').innerText = `⏱️ ${timeLeft}s`;
  }

  function checkAnswer(selectedIndex, element) {
    clearInterval(timerInterval);
    soundTension.pause();

    const isCorrect = selectedIndex === currentQuestion.correcta;

    if (isCorrect) {
      element.classList.add('correct');
      soundCorrect.play();
      setTimeout(() => {
        alert("¡Correcto!");
        nextQuestion();
      }, 600);
    } else {
      element.classList.add('wrong');
      soundWrong.play();
      setTimeout(() => {
        alert("¡Incorrecto! Pasamos a la siguiente pregunta.");
        nextQuestion();
      }, 600);
    }
  }

  function onTimeOut() {
    soundTension.pause();
    soundWrong.play();
    alert("¡Tiempo agotado!");
    nextQuestion();
  }
</script>

</body>
</html>
