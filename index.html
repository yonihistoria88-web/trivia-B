
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia Bíblica Interactiva</title>
  <style>
    :root {
      --bg-color: #f4f6f9;
      --primary: #3b82f6;
      --success: #22c55e;
      --danger: #ef4444;
      --text: #1f2937;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text);
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 24px;
      box-sizing: border-box;
      position: relative;
    }

    .screen { text-align: center; }
    .hidden { display: none !important; }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin: 12px 0;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      box-sizing: border-box;
      text-align: center;
    }

    .btn-main {
      background: var(--primary);
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      margin-top: 10px;
    }

    .timer-bar {
      width: 100%;
      height: 12px;
      background: #e5e7eb;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .timer-progress {
      height: 100%;
      width: 100%;
      background: var(--primary);
      transition: width 1s linear, background-color 0.3s;
    }

    .header-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .category-badge {
      background: #e0e7ff;
      color: #3730a3;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    .question-card {
      font-size: 1.15rem;
      margin-bottom: 24px;
      line-height: 1.4;
      font-weight: 600;
      text-align: left;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-option {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      padding: 16px;
      border-radius: 14px;
      font-size: 1rem;
      text-align: left;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-option.correct {
      background: #dcfce7;
      border-color: var(--success);
      color: #15803d;
    }

    .btn-option.wrong {
      background: #fee2e2;
      border-color: var(--danger);
      color: #b91c1c;
    }

    /* Tabla de Ranking */
    .ranking-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    .ranking-table th, .ranking-table td {
      padding: 10px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
    }

    .ranking-table th { background: #f8fafc; }
  </style>
</head>
<body>

<div class="app-container">
  <!-- Pantalla de Inicio -->
  <div id="startScreen" class="screen">
    <h1>🎡 Trivia Bíblica</h1>
    <p>Ingresa tu nombre para comenzar:</p>
    <input type="text" id="playerName" placeholder="Tu Nombre o Apodo" maxlength="15">
    <button class="btn-main" onclick="initGame()">¡COMENZAR JUEGO!</button>
  </div>

  <!-- Pantalla de Juego -->
  <div id="gameScreen" class="screen hidden">
    <div class="timer-bar">
      <div id="timerProgress" class="timer-progress"></div>
    </div>

    <div class="header-info">
      <span id="categoryBadge" class="category-badge">Cargando...</span>
      <span id="scoreBadge">⭐ 0 pts</span>
      <span id="timerText">⏱️ 90s</span>
    </div>

    <div class="question-card" id="questionText">Cargando pregunta...</div>
    <div class="options-grid" id="optionsContainer"></div>
  </div>

  <!-- Pantalla de Fin de Juego y Ranking -->
  <div id="endScreen" class="screen hidden">
    🏆 <h2>¡Juego Terminado!</h2>
    <p id="finalScoreText">Obtuviste 0 puntos</p>
    
    <h3>🥇 Tabla de Posiciones</h3>
    <table class="ranking-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Jugador</th>
          <th>Puntos</th>
        </tr>
      </thead>
      <tbody id="rankingBody"></tbody>
    </table>

    <button class="btn-main" onclick="resetToStart()">Jugar de Nuevo</button>
  </div>
</div>

<script>
  let audioCtx = null;
  let tickInterval = null;

  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone(freq, duration, type = 'sine') {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function playCorrectSound() {
    initAudio();
    playTone(523.25, 0.15);
    setTimeout(() => playTone(659.25, 0.15), 100);
    setTimeout(() => playTone(783.99, 0.3), 200);
  }

  function playWrongSound() {
    initAudio();
    playTone(300, 0.2, 'sawtooth');
    setTimeout(() => playTone(220, 0.3, 'sawtooth'), 150);
  }

  function playTickSound() {
    initAudio();
    playTone(800, 0.05, 'square');
  }

  let questions = [];
  let askedQuestions = [];
  let currentQuestion = null;
  let timeLeft = 90;
  let maxTime = 90;
  let timerInterval;
  
  let currentPlayer = "";
  let totalScore = 0;

  function limpiarOpcion(texto) {
    return texto.replace(/^[A-Da-d][\.\)\-]\s*/, '');
  }

  async function loadQuestions() {
    try {
      const res = await fetch('preguntas.json');
      questions = await res.json();
    } catch(e) {
      alert("Error al cargar preguntas.json");
    }
  }

  async function initGame() {
    const nameInput = document.getElementById('playerName').value.trim();
    if (!nameInput) {
      alert("Por favor ingresa un nombre para jugar.");
      return;
    }

    currentPlayer = nameInput;
    totalScore = 0;
    askedQuestions = [];

    initAudio();
    await loadQuestions();
    if (questions.length === 0) return;

    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('endScreen').classList.add('hidden');
    document.getElementById('gameScreen').classList.remove('hidden');

    updateScoreUI();
    nextQuestion();
  }

  function calculatePoints(secondsTaken) {
    if (secondsTaken <= 10) return 10;
    if (secondsTaken <= 30) return 7;
    if (secondsTaken <= 60) return 5;
    if (secondsTaken <= 90) return 3;
    return 0;
  }

  function nextQuestion() {
    const availableQuestions = questions.filter((_, idx) => !askedQuestions.includes(idx));

    if (availableQuestions.length === 0) {
      finishGame();
      return;
    }

    const randomIndex = Math.floor(Math.random() * availableQuestions.length);
    currentQuestion = availableQuestions[randomIndex];

    const originalIndex = questions.indexOf(currentQuestion);
    askedQuestions.push(originalIndex);

    document.getElementById('categoryBadge').innerText = currentQuestion.categoria || 'General';
    document.getElementById('questionText').innerText = currentQuestion.pregunta;

    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';

    let optionsWithIndex = currentQuestion.opciones.map((op, idx) => ({
      texto: limpiarOpcion(op),
      esCorrecta: idx === currentQuestion.correcta
    }));

    for (let i = optionsWithIndex.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [optionsWithIndex[i], optionsWithIndex[j]] = [optionsWithIndex[j], optionsWithIndex[i]];
    }

    optionsWithIndex.forEach((item) => {
      const btn = document.createElement('button');
      btn.className = 'btn-option';
      btn.innerText = item.texto;
      btn.onclick = () => checkAnswer(item.esCorrecta, btn);
      container.appendChild(btn);
    });

    startQuestionTimer(90);
  }

  function startQuestionTimer(seconds) {
    maxTime = seconds;
    timeLeft = seconds;
    clearInterval(timerInterval);
    clearInterval(tickInterval);

    updateTimerUI();

    tickInterval = setInterval(() => {
      if (timeLeft <= 10) playTickSound();
    }, 1000);

    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerUI();

      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        clearInterval(tickInterval);
        onTimeOut();
      }
    }, 1000);
  }

  function updateTimerUI() {
    const progressPercent = (timeLeft / maxTime) * 100;
    const progressBar = document.getElementById('timerProgress');
    progressBar.style.width = progressPercent + '%';
    progressBar.style.backgroundColor = progressPercent <= 30 ? 'var(--danger)' : 'var(--primary)';
    document.getElementById('timerText').innerText = `⏱️ ${timeLeft}s`;
  }

  function updateScoreUI() {
    document.getElementById('scoreBadge').innerText = `⭐ ${totalScore} pts`;
  }

  function checkAnswer(isCorrect, element) {
    clearInterval(timerInterval);
    clearInterval(tickInterval);

    const secondsTaken = maxTime - timeLeft;

    if (isCorrect) {
      const pts = calculatePoints(secondsTaken);
      totalScore += pts;
      updateScoreUI();

      element.classList.add('correct');
      playCorrectSound();
    } else {
      element.classList.add('wrong');
      playWrongSound();
    }

    setTimeout(() => {
      nextQuestion();
    }, 1200);
  }

  function onTimeOut() {
    playWrongSound();
    setTimeout(() => {
      nextQuestion();
    }, 1200);
  }

  function finishGame() {
    document.getElementById('gameScreen').classList.add('hidden');
    document.getElementById('endScreen').classList.remove('hidden');

    document.getElementById('finalScoreText').innerText = `${currentPlayer}, tu puntaje final fue: ${totalScore} puntos.`;

    saveAndRenderRanking(currentPlayer, totalScore);
  }

  function saveAndRenderRanking(name, score) {
    let ranking = JSON.parse(localStorage.getItem('trivia_ranking')) || [];

    // Agregar nueva puntuación
    ranking.push({ name, score, date: new Date().toLocaleDateString() });

    // Ordenar de MAYOR a MENOR puntaje
    ranking.sort((a, b) => b.score - a.score);

    // Conservar solo el Top 10
    ranking = ranking.slice(0, 10);

    // Guardar nuevamente
    localStorage.setItem('trivia_ranking', JSON.stringify(ranking));

    // Renderizar en la tabla HTML
    const tbody = document.getElementById('rankingBody');
    tbody.innerHTML = '';

    ranking.forEach((player, index) => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td><strong>${index + 1}º</strong></td>
        <td>${player.name}</td>
        <td><strong>${player.score} pts</strong></td>
      `;
      tbody.appendChild(row);
    });
  }

  function resetToStart() {
    document.getElementById('endScreen').classList.add('hidden');
    document.getElementById('startScreen').classList.remove('hidden');
  }
</script>

</body>
</html>
